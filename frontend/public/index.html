<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a2332" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Write correct manifest and app title based on URL path
      // Must use document.write so iOS Safari sees the right manifest before parsing completes
      // Check both direct path AND the 404.html redirect pattern (/?/field...)
      var isField = window.location.pathname.startsWith('/field') || window.location.search.startsWith('?/field');
      if (isField) {
        document.write('<meta name="apple-mobile-web-app-title" content="Titan Field" />');
        document.write('<link rel="manifest" href="%PUBLIC_URL%/manifest-field.json" />');
        document.write('<link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon-field.png" />');
      } else {
        document.write('<meta name="apple-mobile-web-app-title" content="Titan PM" />');
        document.write('<link rel="manifest" href="%PUBLIC_URL%/manifest.json" />');
        document.write('<link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />');
      }
    </script>
    <meta name="description" content="Titan Project Management System" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <title>Titan</title>
    <!-- SPA routing support for static hosting (Render) -->
    <script>
      // Single Page Apps redirect handling
      // This script checks for a redirect from 404.html and restores the URL
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
